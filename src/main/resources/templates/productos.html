<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container py-5">
        <div class="text-center mb-4">
            <h1 class="fw-bold">🌸 Catálogo de Productos 🌸</h1>
            <p class="text-muted">Explora nuestros productos disponibles</p>

            <div th:if="${filtro != null}" class="alert alert-info rounded-pill shadow-sm">
                <span th:text="${filtro}">Filtro aplicado</span>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-md-6 col-lg-4" th:each="p : ${productos}">
                <div class="card h-100 shadow-sm card-hover">
                    <div class="card-body">
                        <h5 class="card-title fw-bold" th:text="${p.nombre}">Nombre</h5>

                        <p class="text-muted small" th:text="${p.descripcion}">
                            Descripción
                        </p>

                        <p class="fw-bold">
                            ₡<span th:text="${#numbers.formatDecimal(p.precio,1,2)}">0</span>
                        </p>

                        <p>
                            <span class="badge bg-light text-dark">
                                Categoría:
                                <span th:text="${p.categoria}">Categoria</span>
                            </span>
                        </p>

                        <p>
                            Stock:
                            <span th:classappend="${p.agotado} ? 'stock-agotado' : (${p.bajoStock} ? 'stock-bajo' : 'stock-ok')"
                                  th:text="${p.stock}">
                                0
                            </span>
                        </p>

                        <a th:href="@{/productos/{id}(id=${p.id})}" class="btn btn-outline-primary btn-sm">
                            Ver detalle ♡
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(productos)}" class="alert alert-warning text-center mt-4 rounded-pill">
            No hay productos para mostrar 🌸
        </div>
    </main>

    <div th:replace="~{fragments/header :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
