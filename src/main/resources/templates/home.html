<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">🌸 Bienvenida a TiendaApp 🌸</h1>
            <p class="lead text-muted">
                Hola, <span th:text="${nombre}">Estudiante</span>. Esta es tu tienda de productos.
            </p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-12 col-md-5">
                <div class="card shadow-sm card-hover text-center">
                    <div class="card-body">
                        <h5 class="card-title">Productos registrados</h5>
                        <p class="display-5 fw-bold brand-accent" th:text="${totalProductos}">0</p>
                        <a href="/productos" class="btn btn-outline-primary">
                            Ver productos ♡
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-5">
                <div class="card shadow-sm card-hover text-center">
                    <div class="card-body">
                        <h5 class="card-title">Productos con bajo stock</h5>
                        <p class="display-5 fw-bold stock-bajo" th:text="${bajoStock}">0</p>
                        <a href="/productos/bajo-stock" class="btn btn-outline-primary">
                            Revisar stock 🌸
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/header :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
