<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del producto - TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container py-5">
        <nav class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a href="/productos">Productos</a>
                </li>
                <li class="breadcrumb-item active" th:text="${producto?.nombre} ?: 'No encontrado'">
                    Producto
                </li>
            </ol>
        </nav>

        <div th:if="${producto != null}" class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm card-hover">
                    <div class="card-body p-4">
                        <h1 class="fw-bold mb-3" th:text="${producto.nombre}">
                            Nombre del producto
                        </h1>

                        <p class="text-muted" th:text="${producto.descripcion}">
                            Descripción del producto
                        </p>

                        <hr>

                        <p class="fs-4 fw-bold brand-accent">
                            ₡<span th:text="${#numbers.formatDecimal(producto.precio,1,2)}">0</span>
                        </p>

                        <p>
                            <span class="badge bg-light text-dark">
                                Categoría:
                                <span th:text="${producto.categoria}">Categoría</span>
                            </span>
                        </p>

                        <p>
                            Stock:
                            <span
                                th:classappend="${producto.agotado} ? 'stock-agotado' : (${producto.bajoStock} ? 'stock-bajo' : 'stock-ok')"
                                th:text="${producto.stock}">
                                0
                            </span>
                        </p>

                        <div class="mt-4 d-flex gap-2">
                            <a href="/productos" class="btn btn-outline-primary">
                                ← Volver al catálogo
                            </a>

                            <a href="/" class="btn btn-outline-secondary rounded-pill">
                                Inicio
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${producto == null}" class="alert alert-warning text-center rounded-pill shadow-sm">
            Producto no encontrado 🌸
        </div>
    </main>

    <div th:replace="~{fragments/header :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
